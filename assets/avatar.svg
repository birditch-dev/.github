<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- background (full bleed; GitHub applies its own corner rounding) -->
  <rect width="512" height="512" fill="#0d1117"/>

  <g transform="translate(0,-14)">
  <!-- branch -->
  <rect x="52" y="384" width="408" height="16" rx="8" fill="#3d444d"/>
  <rect x="330" y="352" width="14" height="44" rx="7" fill="#3d444d" transform="rotate(38 337 374)"/>

  <!-- tail -->
  <path d="M170 268 L88 210 L104 322 Z" fill="#ea580c"/>

  <!-- body -->
  <circle cx="248" cy="288" r="98" fill="#f97316"/>

  <!-- head -->
  <circle cx="322" cy="206" r="60" fill="#f97316"/>
  <!-- neck fill between head and body -->
  <path d="M248 190 L322 146 L380 240 L248 386 Z" fill="#f97316"/>

  <!-- wing -->
  <ellipse cx="228" cy="296" rx="58" ry="34" fill="#c2410c" transform="rotate(-24 228 296)"/>

  <!-- beak -->
  <path d="M376 192 L442 208 L376 236 Z" fill="#fbbf24"/>

  <!-- eye -->
  <circle cx="330" cy="196" r="12" fill="#0d1117"/>

  <!-- legs -->
  <rect x="226" y="368" width="9" height="26" rx="4.5" fill="#fbbf24"/>
  <rect x="266" y="368" width="9" height="26" rx="4.5" fill="#fbbf24"/>
  </g>
</svg>
